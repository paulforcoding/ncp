name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: "-fmt sarif -out gosec.sarif ./..."
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Vet (default + integration tags)
        run: |
          go vet ./...
          go vet -tags=integration ./...
      - name: Run unit tests
        run: go test ./... -count=1 -race -timeout 180s

  integration:
    name: Integration Tests (no creds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Run integration tests (Local + Remote/ncp:// matrix)
        # OSS-dependent cases call requireOSS(t) which skips when NCP_OSS_AK is unset.
        run: go test -tags=integration -count=1 -race -timeout 600s ./integration_test/...

  integration-oss:
    name: Integration Tests (OSS)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      NCP_OSS_ENDPOINT: ${{ secrets.NCP_OSS_ENDPOINT }}
      NCP_OSS_REGION: ${{ secrets.NCP_OSS_REGION }}
      NCP_OSS_AK: ${{ secrets.NCP_OSS_AK }}
      NCP_OSS_SK: ${{ secrets.NCP_OSS_SK }}
      NCP_OSS_BUCKET: ${{ secrets.NCP_OSS_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Check OSS credentials
        id: creds
        run: |
          if [ -z "$NCP_OSS_AK" ] || [ -z "$NCP_OSS_SK" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::OSS credentials not configured; skipping OSS integration tests"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run OSS integration tests
        if: steps.creds.outputs.available == 'true'
        # Cover all directions involving OSS: OSS↔OSS, OSS↔Remote, Remote↔OSS, plus the
        # raw aliyun SDK smoke tests. -run 'OSS' matches by substring, so it picks up
        # TestIntegration_OSS_*, *ToOSS*, and OSSTo* alike.
        run: |
          go test -tags=integration -count=1 -timeout 1200s -v \
            -run 'OSS' \
            ./integration_test/...

  cli-smoke:
    name: CLI Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build ncp
        run: go build -o /tmp/ncp ./cmd/ncp/
      - name: --version flag
        run: /tmp/ncp --version | grep -q "ncp"
      - name: --dry-run prints effective config
        run: |
          mkdir -p /tmp/dr-src /tmp/dr-dst
          /tmp/ncp copy /tmp/dr-src /tmp/dr-dst --dry-run 2>&1 | grep -q "CopyParallelism"
      - name: ncp serve + copy end-to-end
        run: |
          mkdir -p /tmp/serve-src
          echo "hello-ncp" > /tmp/serve-src/foo.txt
          /tmp/ncp serve --listen 127.0.0.1:9900 &
          SERVE_PID=$!
          for i in 1 2 3 4 5; do
            ss -tln | grep -q ':9900' && break
            sleep 1
          done
          ss -tln | grep -q ':9900' || { echo "ncp serve not listening"; exit 1; }
          /tmp/ncp copy /tmp/serve-src ncp://127.0.0.1:9900/tmp/serve-dst \
            --ProgressStorePath /tmp/serve-progress
          kill $SERVE_PID 2>/dev/null || true
          [ "$(cat /tmp/serve-dst/foo.txt)" = "hello-ncp" ] || { echo "FAIL: file mismatch"; exit 1; }
      - name: Multi-source local copy
        run: |
          mkdir -p /tmp/ms-src1 /tmp/ms-src2
          echo a > /tmp/ms-src1/a.txt
          echo b > /tmp/ms-src2/b.txt
          /tmp/ncp copy /tmp/ms-src1 /tmp/ms-src2 /tmp/ms-dst \
            --ProgressStorePath /tmp/ms-progress
          [ -f /tmp/ms-dst/ms-src1/a.txt ] || { echo "FAIL: ms-src1 missing"; exit 1; }
          [ -f /tmp/ms-dst/ms-src2/b.txt ] || { echo "FAIL: ms-src2 missing"; exit 1; }
      - name: Multi-source mixed-scheme rejection
        run: |
          /tmp/ncp copy /tmp/ms-src1 oss://bucket/prefix /tmp/dst-rejected 2>&1 | \
            grep -q "multi-source is only supported for local paths" || \
            { echo "FAIL: mixed-source not rejected"; exit 1; }
